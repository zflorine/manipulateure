var EMOJIS = ["\u{1F3AF}","\u{1F4AC}","\u{1F97A}","\u{1F381}","\u{1F607}","\u{1F4F1}","\u{1F9E9}","\u{1F62D}","\u{1F525}","\u{1F3AD}","\u{1F465}","\u{1F4A1}","\u2764\uFE0F","\u{1F5E3}\uFE0F","\u{1F575}\uFE0F","\u{1F30A}","\u{1F3C6}","\u{1F610}","\u{1F511}","\u{1FA9E}"];
var PEMOJIS = ["\u{1F411}","\u{1F33F}","\u2696\uFE0F","\u{1F98A}","\u{1F578}\uFE0F"];

function applyEmojis() {
  QUESTIONS.fr.forEach(function(q,i){ q.e = EMOJIS[i]; });
  QUESTIONS.en.forEach(function(q,i){ q.e = EMOJIS[i]; });
  PROFILES.fr.forEach(function(p,i){ p.emoji = PEMOJIS[i]; });
  PROFILES.en.forEach(function(p,i){ p.emoji = PEMOJIS[i]; });
}
applyEmojis();

var current = 0;
var answers = new Array(20).fill(null);
var currentProfile = null;

function t(key){ return UI[lang][key]; }

function setLang(l) {
  lang = l;
  document.querySelectorAll(".lang-btn").forEach(function(b){ b.classList.remove("active"); });
  document.querySelectorAll(".lang-btn").forEach(function(b){ if(b.getAttribute("onclick")==="setLang('" + l + "')") b.classList.add("active"); });
  renderUI();
  if(document.getElementById("screen-quiz").classList.contains("active")) renderQ();
  if(document.getElementById("screen-result").classList.contains("active") && currentProfile) showResult();
}

function renderUI() {
  document.getElementById("i-eyebrow").textContent = t("eyebrow");
  document.getElementById("i-tagline").textContent = t("tagline");
  document.getElementById("i-surprise").textContent = t("surprise");
  document.getElementById("i-m1").textContent = t("m1");
  document.getElementById("i-m2").textContent = t("m2");
  document.getElementById("i-m3").textContent = t("m3");
  document.getElementById("i-btn").textContent = t("startBtn");
  document.getElementById("i-note").textContent = t("note");
  document.getElementById("btn-pdf-label").textContent = t("pdfBtn");
  document.getElementById("btn-retry-label").textContent = t("retryBtn");
  var lLeft = document.getElementById("lbl-left");
  var lRight = document.getElementById("lbl-right");
  if(lLeft) lLeft.textContent = t("lblLeft");
  if(lRight) lRight.textContent = t("lblRight");
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
  window.scrollTo({top:0, behavior:"smooth"});
}

function startQuiz(){ showScreen("screen-quiz"); renderQ(); }

function renderQ() {
  var q = QUESTIONS[lang][current];
  document.getElementById("q-emoji").textContent = q.e;
  document.getElementById("q-text").textContent = q.t;
  document.getElementById("progress-fill").style.width = (current / 20 * 100) + "%";
  document.getElementById("progress-num").textContent = (current + 1) + " " + t("of") + " 20";
  document.getElementById("btn-prev").textContent = t("prev");
  var opts = document.getElementById("options");
  opts.innerHTML = "";
  q.o.forEach(function(o, i) {
    var b = document.createElement("button");
    b.className = "opt" + (answers[current] === i ? " selected" : "");
    b.textContent = o.l;
    b.onclick = function(){ selectOpt(i); };
    opts.appendChild(b);
  });
  document.getElementById("btn-prev").disabled = (current === 0);
}

function selectOpt(i) {
  answers[current] = i;
  document.querySelectorAll(".opt").forEach(function(b, idx){ b.classList.toggle("selected", idx === i); });
  setTimeout(function(){
    if(current === 19){ showResult(); } else { current++; renderQ(); }
  }, 320);
}

function prevQ(){ if(current > 0){ current--; renderQ(); } }

function showResult() {
  var total = answers.reduce(function(s, a, i){ return s + (a !== null ? QUESTIONS[lang][i].o[a].v : 0); }, 0);
  var p = PROFILES[lang].find(function(p){ return total >= p.min && total <= p.max; }) || PROFILES[lang][2];
  currentProfile = p;
  document.getElementById("r-emoji").textContent = p.emoji;
  document.getElementById("r-type").textContent = p.type;
  document.getElementById("r-subtitle").textContent = p.subtitle;
  document.getElementById("r-desc").textContent = p.desc;
  var badge = document.getElementById("r-badge");
  badge.textContent = p.badge; badge.style.background = p.badgeBg; badge.style.color = p.badgeColor;
  var bar = document.getElementById("r-bar");
  bar.style.background = p.barColor; bar.style.width = "0%";
  document.getElementById("r-tips").innerHTML =
    "<p class=\"tips-title\">" + t("tipsTitle") + "</p>" +
    p.tips.map(function(tip){ return "<div class=\"tip\"><span class=\"tip-dot\"></span><span>" + tip + "</span></div>"; }).join("");
  document.getElementById("lbl-left").textContent = t("lblLeft");
  document.getElementById("lbl-right").textContent = t("lblRight");
  document.getElementById("btn-pdf-label").textContent = t("pdfBtn");
  document.getElementById("btn-retry-label").textContent = t("retryBtn");
  showScreen("screen-result");
  setTimeout(function(){ bar.style.width = p.barWidth; }, 120);
}

function restart() {
  current = 0; answers = new Array(20).fill(null); currentProfile = null;
  showScreen("screen-intro");
}

function downloadPDF() {
  if(!currentProfile) return;
  function buildPDF() {
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({unit:"mm", format:"a4"});
    var W = 210, pad = 22;
    doc.setFillColor(163,45,45); doc.rect(0,0,W,30,"F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(20);
    doc.text("Manipulateure ?", pad, 13);
    doc.setFont("helvetica","normal"); doc.setFontSize(9);
    doc.text(lang === "fr" ? "Test de personnalité - Resultats" : "Personality test - Results", pad, 21);
    var y = 42;
    doc.setTextColor(25,25,25); doc.setFont("helvetica","bold"); doc.setFontSize(22);
    doc.text(currentProfile.type, pad, y); y += 8;
    doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(120,120,120);
    doc.text(currentProfile.subtitle, pad, y); y += 10;
    doc.setDrawColor(224,221,216); doc.setLineWidth(0.3); doc.line(pad,y,W-pad,y); y += 9;
    doc.setFontSize(10); doc.setTextColor(60,60,60); doc.setFont("helvetica","normal");
    var dl = doc.splitTextToSize(currentProfile.desc, W-pad*2);
    doc.text(dl, pad, y); y += dl.length * 5.2 + 10;
    doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(163,45,45);
    doc.text(lang === "fr" ? "3 CHOSES A EXPLORER" : "3 THINGS TO EXPLORE", pad, y); y += 6;
    doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(60,60,60);
    currentProfile.tips.forEach(function(tip){
      var lines = doc.splitTextToSize("- " + tip, W-pad*2);
      doc.text(lines, pad, y); y += lines.length * 5.2 + 2;
    });
    y += 8; doc.setDrawColor(224,221,216); doc.line(pad,y,W-pad,y); y += 7;
    doc.setFontSize(8); doc.setTextColor(160,160,160);
    doc.text("zflorine.github.io/manipulateure  -  " + new Date().toLocaleDateString(lang === "fr" ? "fr-FR" : "en-GB"), pad, y);
    doc.save("manipulateure-profil.pdf");
  }
  if(window.jspdf && window.jspdf.jsPDF){ buildPDF(); }
  else {
    var s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload = buildPDF;
    document.head.appendChild(s);
  }
}

renderUI();
</script>
